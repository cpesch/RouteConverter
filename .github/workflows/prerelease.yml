name: Prerelease

# Build prerelease artefacts on every push to master + nightly + manual,
# publish to static.routeconverter.com/downloads/prereleases/ and the
# rolling `prerelease` GitHub Release.
#
# Infra: bootstrap-server/12-release-deploy-user.sh provisions the
# rc-release-deploy SSH user + restricted-rsync wrapper that only accepts
# writes into /var/www/routeconverter.com/static/downloads/{prereleases,
# release,previous-releases}/.
#
# See rc-meta/docs/00018-release-automation-3.4.md Phase 2.

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: prerelease
  cancel-in-progress: true

permissions:
  contents: write   # for the rolling GH Release

jobs:
  # Skip release-prepare's two [maven-release-plugin] commits — the
  # pre-tag commit is the canonical 3.x release (covered by release.yml on
  # the tag push) and the post-tag commit is the next-dev bump (no point
  # building a prerelease of an empty version bump). Otherwise burns
  # ~10 min of CI per cut on duplicate work. See rc-meta docs/00018 5.8.
  build-linux-mac:
    if: |
      github.event_name != 'push'
      || github.actor != 'github-actions[bot]'
      || !startsWith(github.event.head_commit.message, '[maven-release-plugin]')
    uses: ./.github/workflows/_build-linux-mac.yml
    with:
      artefact-name: prerelease-linux-mac
      retention-days: 7

  build-windows:
    if: |
      github.event_name != 'push'
      || github.actor != 'github-actions[bot]'
      || !startsWith(github.event.head_commit.message, '[maven-release-plugin]')
    uses: ./.github/workflows/_build-windows.yml
    with:
      artefact-name: prerelease-windows
      retention-days: 7

  publish:
    needs: [build-linux-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: incoming
      - name: Flatten
        run: |
          mkdir -p artefacts
          find incoming -mindepth 2 -type f -exec mv -t artefacts/ {} +
          ls -la artefacts/
      - name: Drop version suffix from Portable in artefacts/
        run: |
          # Portable Installer build output carries the version + build
          # number in the filename. prereleases/ serves a stable short
          # name so public/automated download URLs don't churn per build.
          # Build number stays inside the .paf.exe metadata.
          for f in artefacts/RouteConverterPortable_*.paf.exe; do
            [[ -f "$f" ]] && mv "$f" artefacts/RouteConverterPortable.paf.exe
          done
          ls -la artefacts/
      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.RC_RELEASE_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Rsync to static.routeconverter.com/downloads/prereleases/
        env:
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          rsync -av --omit-dir-times --no-perms \
            artefacts/ \
            "rc-release-deploy@${DEPLOY_HOST}:/var/www/routeconverter.com/static/downloads/prereleases/"
      - name: Update rolling 'prerelease' GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          tag=prerelease
          # Delete previous release + tag so the asset set is replaced
          # rather than accumulating duplicates.
          gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || true
          gh release create "$tag" artefacts/* \
            --repo "$REPO" \
            --title "Rolling prerelease ($(date -u +%Y-%m-%d))" \
            --notes "Automated build of master @ ${GITHUB_SHA::7}." \
            --prerelease \
            --target master
