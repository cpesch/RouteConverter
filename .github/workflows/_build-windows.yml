name: _build-windows

# Reusable workflow: builds RouteConverter + TimeAlbumPro OpenSource
# artefacts on windows-latest, plus the two NSIS bundle .exes and the
# RouteConverterPortable .paf.exe. Uploads everything as a workflow
# artefact.
#
# Inputs from the caller cover the artefact name + retention; everything
# else (JRE version, NSIS pin, installer URLs) is resolved inside.
#
# Called by:
#   - prerelease.yml (artefact-name: prerelease-windows)
#   - release.yml    (artefact-name: release-windows)
#
# See rc-meta/specs/00018-release-automation-3.4.md Phase 5.2.

on:
  workflow_call:
    inputs:
      artefact-name:
        description: 'Name for the uploaded workflow artefact'
        required: true
        type: string
      retention-days:
        description: 'Retention in days for the workflow artefact'
        required: false
        type: number
        default: 7
      sign:
        description: 'Submit installers to SignPath for Authenticode signing'
        required: false
        type: boolean
        default: false
      signing-policy-slug:
        description: 'SignPath signing policy (test-signing | release-signing)'
        required: false
        type: string
        default: test-signing
    secrets:
      # Submitter-only token: can request a sign, cannot extract the cert
      # (cert stays in the SignPath HSM). See rc-meta specs/00043.
      SIGNPATH_API_TOKEN:
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve JRE version from pom (single source of truth)
        id: jre
        shell: bash
        run: |
          ver=$(sed -nE 's|.*<jre\.version>([^<]+)</jre\.version>.*|\1|p' \
                pom.xml | head -1)
          [[ -n "$ver" ]] || { echo "::error::failed to resolve jre.version"; exit 1; }
          echo "version=$ver"                     >> "$GITHUB_OUTPUT"
          echo "base=jre-$ver-x64-stripped"       >> "$GITHUB_OUTPUT"
          echo "JRE_VERSION=$ver"                 >> "$GITHUB_ENV"
          echo "JRE_BASE=jre-$ver-x64-stripped"   >> "$GITHUB_ENV"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.jre.outputs.version }}
      - uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build (incl. bundle modules, resource-filters .nsi)
        shell: cmd
        run: ./mvnw.cmd --batch-mode -Prouteconverter -Dmaven.build.number=${{ github.run_number }} clean package

      - name: Pin NSIS 3.11
        shell: pwsh
        run: |
          choco install nsis --version=3.11 --no-progress -y
          # choco doesn't refresh PATH for subsequent steps; export the
          # install dir so `makensis` resolves in later cmd / bash steps.
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\NSIS"

      - name: Cache stripped JRE
        id: jre-cache
        uses: actions/cache@v5
        with:
          path: jre-cache
          key: ${{ env.JRE_BASE }}-v1

      - name: Download stripped JRE (cache miss only)
        if: steps.jre-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p jre-cache
          cd jre-cache
          # --retry-all-errors so a mid-transfer "connection reset by peer"
          # (curl exit 35) is retried, not just connection-refused errors.
          curl_opts=(-fsSLO --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30)
          curl "${curl_opts[@]}" "https://static.routeconverter.com/build/windows/${JRE_BASE}.zip"
          curl "${curl_opts[@]}" "https://static.routeconverter.com/build/windows/${JRE_BASE}.zip.sha256"
          sha256sum -c "${JRE_BASE}.zip.sha256"

      - name: Extract JRE into both bundle modules
        shell: bash
        run: |
          for m in RouteConverterWindows TimeAlbumProWindows; do
            rm -rf "$m/jre-${JRE_VERSION}"
            unzip -q "jre-cache/${JRE_BASE}.zip" -d "$m/jre-${JRE_VERSION}"
          done
          ls RouteConverterWindows/jre-${JRE_VERSION}/bin/java.exe
          ls TimeAlbumProWindows/jre-${JRE_VERSION}/bin/java.exe

      - name: makensis RouteConverterWindows
        shell: cmd
        working-directory: RouteConverterWindows
        run: makensis "target\RouteConverter.nsi"

      - name: makensis TimeAlbumProWindows
        shell: cmd
        working-directory: TimeAlbumProWindows
        run: makensis "target\TimeAlbumPro.nsi"

      - name: Cache PortableApps.com Installer
        id: pa-cache
        uses: actions/cache@v5
        with:
          path: pa-installer/extracted
          key: pa-installer-v1

      - name: Download + extract PortableApps.com Installer (cache miss only)
        if: steps.pa-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pa-installer\extracted | Out-Null
          # portableapps.com 403s GH Actions IPs even with browser UA;
          # mirror the .paf.exe on our static vhost.
          Invoke-WebRequest -Uri 'https://static.routeconverter.com/build/windows/PortableApps.comInstaller.paf.exe' `
                            -OutFile pa-installer\installer.paf.exe `
                            -MaximumRedirection 5 `
                            -MaximumRetryCount 5 `
                            -RetryIntervalSec 5 `
                            -UseBasicParsing
          # NSIS self-extractor — 7z handles it.
          & "C:\Program Files\7-Zip\7z.exe" x pa-installer\installer.paf.exe -opa-installer\extracted -y | Out-Null

      - name: Locate PortableApps.comInstaller.exe
        id: pa-locate
        shell: pwsh
        run: |
          $exe = (Get-ChildItem pa-installer\extracted -Recurse -Filter 'PortableApps.comInstaller.exe' |
                  Select-Object -First 1).FullName
          if (-not $exe) {
            Write-Host "--- full pa-installer\extracted tree ---"
            Get-ChildItem pa-installer\extracted -Recurse | Format-Table FullName
            throw "PortableApps.comInstaller.exe not found"
          }
          Write-Host "found: $exe"
          "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Build RouteConverterPortable .paf.exe
        # cmd shell matches the smoke run that proved this works
        # (PowerShell did not block on the installer; $LASTEXITCODE was empty).
        shell: cmd
        env:
          INSTALLER_EXE: ${{ steps.pa-locate.outputs.exe }}
        run: |
          set TREE=%CD%\RouteConverterPortable\target\classes\RouteConverterPortable
          if not exist "%TREE%" ( echo Portable tree not found at "%TREE%" & exit /b 1 )
          echo Running: "%INSTALLER_EXE%" "%TREE%"
          "%INSTALLER_EXE%" "%TREE%"
          echo Installer exit code: %ERRORLEVEL%
          dir /B "%CD%\RouteConverterPortable\target\classes" | findstr /I "\.paf\.exe$" || (
            echo No .paf.exe produced
            exit /b 1
          )

      - name: Stage artefacts
        shell: bash
        run: |
          mkdir -p artefacts
          # One bundled .exe per product (the merged module's makensis output).
          # The shaded launcher jar is a build intermediate only — not published.
          cp RouteConverterWindows/target/RouteConverterWindows.exe artefacts/
          cp TimeAlbumProWindows/target/TimeAlbumProWindows.exe artefacts/
          # Portable build output is versioned (RouteConverterPortable_<v>_-<build>.paf.exe);
          # publish to the stable short name HERE so signing + downstream use an
          # exact filename. The callers' own version-drop steps are now redundant.
          shopt -s nullglob
          paf=(RouteConverterPortable/target/classes/RouteConverterPortable*.paf.exe)
          [[ ${#paf[@]} -eq 1 ]] || { echo "::error::expected exactly 1 Portable .paf.exe, got ${#paf[@]}: ${paf[*]}"; exit 1; }
          cp "${paf[0]}" artefacts/RouteConverterPortable.paf.exe
          ls -la artefacts/

      # --- SignPath Authenticode signing (rc-meta specs/00043) ---------------
      # artefacts/ holds only the three installers under exact short names, all
      # to be signed. Submit the dir, overlay the signed copies back, then a
      # single final upload. sign=false (PRs, forks without the secret) skips
      # straight to the upload unchanged.

      - name: Upload unsigned installers (SignPath input)
        if: ${{ inputs.sign }}
        id: unsigned
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-${{ inputs.artefact-name }}
          path: artefacts/
          retention-days: ${{ inputs.retention-days }}

      - name: Submit signing request to SignPath
        if: ${{ inputs.sign }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: RouteConverter
          signing-policy-slug: ${{ inputs.signing-policy-slug }}
          artifact-configuration-slug: windows-installers
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artefacts-signed

      - name: Overlay signed installers into artefacts/
        if: ${{ inputs.sign }}
        shell: bash
        run: cp -f artefacts-signed/* artefacts/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artefact-name }}
          path: artefacts/
          retention-days: ${{ inputs.retention-days }}
