name: Build Mac JRE

# Build the stripped Mac JRE (jlink + trim) for both architectures, publish to
# https://static.routeconverter.com/build/mac/jre-<version>-<arch>-stripped.zip
# alongside a .sha256 sidecar.
#
# RouteConverterMacOpenSource and TimeAlbumProMac assemblies consume these via
# _build-linux-mac.yml — curl + sha256 verify + unzip into
# target/Runtime-<arch>, then maven-assembly-plugin produces per-arch app zips.
#
# Single macos-latest (arm64) runner cross-jlinks both arches: jlink is
# cross-platform — it bundles the jmods' native binaries into the output
# Runtime regardless of the host arch. setup-java is called twice with
# architecture: aarch64 + x64, populating JAVA_HOME_17_ARM64 + JAVA_HOME_17_X64.
# Avoids macos-13 (Intel) runner queue (10–60 min waits, deprecated).
#
# Triggers:
#   workflow_dispatch — manual rebuild
#   push paths — automatic when the jlink recipe changes
#
# Plan: rc-meta docs/00018-release-automation-3.4.md Phase 5.4e.

on:
  workflow_dispatch:
    inputs:
      jdk_version:
        description: 'Override Temurin JDK version (blank = read jre.version from route-converter-build/pom.xml)'
        required: false
        default: ''
  push:
    branches: [master]
    paths:
      - 'route-converter-build/pom.xml'
      - '.github/workflows/build-mac-jre.yml'

concurrency:
  group: build-mac-jre
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript actions (actions/{checkout,setup-java,upload-artifact,download-artifact,cache}@v5 still ship Node 20 binaries as of 2026-06-07). GH forces Node 24 default on 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve JDK version
        id: jdk
        shell: bash
        run: |
          if [[ -n "${{ inputs.jdk_version }}" ]]; then
            ver="${{ inputs.jdk_version }}"
          else
            ver=$(sed -nE 's|.*<jre\.version>([^<]+)</jre\.version>.*|\1|p' \
                  route-converter-build/pom.xml | head -1)
          fi
          [[ -n "$ver" ]] || { echo "::error::failed to resolve JDK version"; exit 1; }
          # Major feature digit for the JAVA_HOME_<major>_<arch> env-var names
          # that setup-java populates (e.g. JAVA_HOME_17_ARM64).
          major="${ver%%.*}"
          echo "version=$ver"  >> "$GITHUB_OUTPUT"
          echo "major=$major"  >> "$GITHUB_OUTPUT"
          echo "JDK version: $ver  major: $major"

      - name: Install Temurin JDK (aarch64)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.version }}
          architecture: aarch64

      - name: Install Temurin JDK (x64)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.version }}
          architecture: x64

      - name: jlink stripped JREs (both arches)
        shell: bash
        env:
          VER:   ${{ steps.jdk.outputs.version }}
          MAJOR: ${{ steps.jdk.outputs.major }}
        run: |
          set -euo pipefail

          # Host jlink (arm64 native) does the work. Cross-target by
          # pointing --module-path at the target arch's jmods. The output
          # Runtime contains target-arch binaries verbatim from those jmods.
          HOST_JLINK="$JAVA_HOME/bin/jlink"

          for arch in aarch64 x64; do
            case "$arch" in
              aarch64) jmods_var="JAVA_HOME_${MAJOR}_ARM64" ;;
              x64)     jmods_var="JAVA_HOME_${MAJOR}_X64"   ;;
            esac
            jmods_home="${!jmods_var:-}"
            [[ -n "$jmods_home" && -d "$jmods_home/jmods" ]] || {
              echo "::error::missing jmods for $arch (expected $jmods_var = $jmods_home)"
              exit 1
            }
            echo "--- jlink $arch from $jmods_home ---"

            OUT="jre-${VER}-${arch}"
            rm -rf "$OUT"
            "$HOST_JLINK" \
              --module-path "$jmods_home/jmods" \
              --add-modules java.base,java.compiler,java.datatransfer,java.desktop,java.logging,java.management,java.naming,java.prefs,java.security.jgss,java.sql,java.xml,java.xml.crypto,jdk.crypto.ec,jdk.unsupported \
              --output "$OUT" \
              --strip-debug --compress 2 --no-header-files --no-man-pages
            rm -rf "$OUT/legal"
            rm -f  "$OUT/release"
            rm -f  "$OUT/bin/keytool"
            rm -f  "$OUT/conf/security/policy/README.txt"
            rm -f  "$OUT/lib/server/Xusage.txt"
          done

      - name: Show full JRE trees
        shell: bash
        env:
          VER: ${{ steps.jdk.outputs.version }}
        run: |
          for arch in aarch64 x64; do
            OUT="jre-${VER}-${arch}"
            echo "=== $OUT ==="
            find "$OUT" -print
            echo "--- summary ---"
            echo "files: $(find "$OUT" -type f | wc -l)"
            echo "dirs:  $(find "$OUT" -type d | wc -l)"
            echo "bytes: $(du -sk "$OUT" | awk '{print $1*1024}')"
          done

      - name: Zip + sha256 (both arches)
        shell: bash
        env:
          VER: ${{ steps.jdk.outputs.version }}
        run: |
          set -euo pipefail
          for arch in aarch64 x64; do
            base="jre-${VER}-${arch}-stripped"
            (cd "jre-${VER}-${arch}" && zip -9 -r "../${base}.zip" . >/dev/null)
            shasum -a 256 "${base}.zip" | awk -v f="${base}.zip" '{print $1"  "f}' > "${base}.zip.sha256"
            ls -la "${base}.zip" "${base}.zip.sha256"
            cat "${base}.zip.sha256"
          done

      - uses: actions/upload-artifact@v5
        with:
          name: stripped-jre
          path: |
            jre-${{ steps.jdk.outputs.version }}-aarch64-stripped.zip
            jre-${{ steps.jdk.outputs.version }}-aarch64-stripped.zip.sha256
            jre-${{ steps.jdk.outputs.version }}-x64-stripped.zip
            jre-${{ steps.jdk.outputs.version }}-x64-stripped.zip.sha256
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: stripped-jre
          path: artefacts/
      - name: Inspect artefacts
        run: ls -la artefacts/
      - name: Configure SSH
        env:
          DEPLOY_KEY:  ${{ secrets.RC_RELEASE_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Rsync to static.routeconverter.com/build/mac/
        env:
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          rsync -av --omit-dir-times --no-perms \
            artefacts/ \
            "rc-release-deploy@${DEPLOY_HOST}:/var/www/routeconverter.com/static/build/mac/"
