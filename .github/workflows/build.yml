name: RouteConverter CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21, 25 ]
    name: Java ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Show Maven version
        run: mvn --version
      - name: Build with Maven
        run: mvn --batch-mode -Dmaven.build.number=${{ github.run_number }} --update-snapshots verify
      # Upload coverage once per build (Java 17 only — avoid 3x duplicate uploads from the matrix)
      - name: Upload coverage to Codecov
        if: matrix.java == 17
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  prerelease:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ 17 ]
    name: Java ${{ matrix.java }} on Windows
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Show Maven version
        run: mvn --version
      - name: Build with Maven
        # Quote the -D: pwsh (default windows-latest shell) tokenizes
        # `.build.number` as member-access, splitting the arg into
        # `-Dmaven` + `.build.number=NNN` → mvn sees the latter as a
        # lifecycle phase and dies.
        run: mvn --batch-mode "-Dmaven.build.number=${{ github.run_number }}" --update-snapshots verify
      - uses: actions/upload-artifact@v7
        with:
          name: RouteConverter Windows Prerelease built with Java ${{ matrix.java }}
          path: RouteConverterWindowsOpenSource/target/RouteConverterWindowsOpenSource.exe
          overwrite: true
