name: RouteConverter CI

on: [push]

env:
  # Opt into Node.js 24 for JavaScript actions (actions/{checkout,setup-java,upload-artifact,download-artifact,cache}@v5 still ship Node 20 binaries as of 2026-06-07). GH forces Node 24 default on 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21, 25 ]
    name: Java ${{ matrix.java }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Show Maven version
        run: mvn --version
      - name: Build with Maven
        run: mvn --batch-mode -Dmaven.build.number=${{ github.run_number }} --update-snapshots verify
      # Upload coverage once per build (Java 17 only — avoid 3x duplicate
      # uploads from the matrix). Replaces the Travis `after_success` curl
      # that uploaded via the codecov bash script.
      - name: Upload coverage to Codecov
        if: matrix.java == 17
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  prerelease:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ 17 ]
    name: Java ${{ matrix.java }} on Windows
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Show Maven version
        run: mvn --version
      - name: Build with Maven
        run: mvn --batch-mode -Dmaven.build.number=${{ github.run_number }} --update-snapshots verify
      - uses: actions/upload-artifact@v5
        with:
          name: RouteConverter Windows Prerelease built with Java ${{ matrix.java }}
          path: RouteConverterWindowsOpenSource/target/RouteConverterWindowsOpenSource.exe
          overwrite: true
