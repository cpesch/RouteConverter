name: Publish Javadoc

# Standalone javadoc publisher. Separate from release.yml so we can
# re-publish (e.g. after a pom doclint fix) without re-tagging the
# release, and so a javadoc build failure cannot block the main
# release pipeline.
#
# Javadoc is NOT versioned on the host: we always overwrite the single
# top-level static/javadoc/ tree. Per-version retention is the GH
# Release artefact set; nobody links to /javadoc/<version>/ from the
# website. (Decision 2026-06-07.)
#
# Triggers:
#   - workflow_dispatch (manual)
#   - push paths-filter on pom.xml + java sources (auto-refresh on
#     master changes)
#
# See rc-meta/docs/00018-release-automation-3.4.md Phase 5.5.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '**/*.java'
      - '**/pom.xml'

concurrency:
  group: javadoc
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript actions (actions/{checkout,setup-java,upload-artifact,download-artifact,cache}@v5 still ship Node 20 binaries as of 2026-06-07). GH forces Node 24 default on 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-javadoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'
      - uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Aggregate javadoc
        run: ./mvnw --batch-mode -DskipTests install javadoc:aggregate
      - name: Configure SSH
        env:
          DEPLOY_KEY:  ${{ secrets.RC_RELEASE_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Rsync to static/javadoc/
        env:
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          rsync -av --delete --omit-dir-times --no-perms \
            target/site/apidocs/ \
            "rc-release-deploy@${DEPLOY_HOST}:/var/www/routeconverter.com/static/javadoc/"
