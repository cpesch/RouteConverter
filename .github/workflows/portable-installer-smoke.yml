name: Portable Installer Smoke

# Smoke test for Phase 5.4c — does PortableApps.com Installer work
# headlessly on windows-latest to build RouteConverterPortable_<v>.paf.exe?
#
# Manual-trigger only. Doesn't deploy. Uploads the resulting .paf.exe (if
# any) as a workflow artefact so the maintainer can sanity-check.
#
# If this smoke works end-to-end, the steps graft into prerelease.yml +
# release.yml's build-windows job after the bundle .exe builds.
#
# See rc-meta/docs/00018-release-automation-3.4.md Phase 5.4c.

on:
  workflow_dispatch:
    inputs:
      installer_url:
        description: 'PortableApps.com Installer download URL (.paf.exe). Override if upstream changed.'
        required: true
        default: 'https://portableapps.com/redirect/?a=PortableApps.comInstaller&s=s&d=pa&n=PortableApps.com%20Installer'

concurrency:
  group: portable-installer-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17.0.15'

      - uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build RouteConverterPortable (mvn produces target/classes/RouteConverterPortable/)
        shell: cmd
        run: ./mvnw.cmd --batch-mode -Prouteconverter -pl RouteConverterPortable -am package

      - name: Inspect built portable tree
        shell: bash
        run: |
          ls -la RouteConverterPortable/target/classes/RouteConverterPortable/
          find RouteConverterPortable/target/classes/RouteConverterPortable -maxdepth 2 -type d

      - name: Download PortableApps.com Installer
        shell: pwsh
        env:
          INSTALLER_URL: ${{ inputs.installer_url }}
        run: |
          New-Item -ItemType Directory -Force -Path pa-installer | Out-Null
          # The redirect endpoint returns a temporary URL; -MaximumRedirection chases it.
          Invoke-WebRequest -Uri $env:INSTALLER_URL `
                            -OutFile pa-installer\installer.paf.exe `
                            -MaximumRedirection 10 `
                            -UseBasicParsing
          Get-Item pa-installer\installer.paf.exe | Format-List Length, FullName

      - name: Extract PortableApps.com Installer via 7z (NSIS self-extractor)
        shell: pwsh
        run: |
          # NSIS-built .exe is 7z-compatible. Extract into pa-installer\extracted\
          New-Item -ItemType Directory -Force -Path pa-installer\extracted | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x `
            pa-installer\installer.paf.exe `
            -opa-installer\extracted `
            -y | Select-Object -Last 20
          Get-ChildItem pa-installer\extracted -Recurse -Filter 'PortableApps.comInstaller.exe' |
            Format-Table FullName, Length

      - name: Locate PortableApps.comInstaller.exe
        id: locate
        shell: pwsh
        run: |
          $found = Get-ChildItem pa-installer\extracted -Recurse -Filter 'PortableApps.comInstaller.exe' |
                   Select-Object -First 1
          if (-not $found) {
            Write-Error "PortableApps.comInstaller.exe not found after extraction"
            exit 1
          }
          "exe=$($found.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "found: $($found.FullName)"

      - name: Run installer against portable tree
        shell: cmd
        env:
          INSTALLER_EXE: ${{ steps.locate.outputs.exe }}
        run: |
          REM CLI invocation per PortableApps wiki:
          REM   PortableApps.comInstaller.exe <full-path-to-app-dir>
          REM Produces installer at parent of <app-dir>.
          set TREE=%CD%\RouteConverterPortable\target\classes\RouteConverterPortable
          echo Running: "%INSTALLER_EXE%" "%TREE%"
          "%INSTALLER_EXE%" "%TREE%"
          echo --- exit code %ERRORLEVEL% ---
          dir "%CD%\RouteConverterPortable\target\classes" /B
          dir "%CD%\RouteConverterPortable\target" /B

      - name: Locate produced .paf.exe (anywhere under RouteConverterPortable)
        shell: pwsh
        run: |
          Get-ChildItem RouteConverterPortable -Recurse -Include '*.paf.exe' |
            Format-Table FullName, Length, LastWriteTime

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: portable-installer-smoke
          path: |
            RouteConverterPortable/target/**/*.paf.exe
            RouteConverterPortable/target/classes/RouteConverterPortable/**
          retention-days: 7
