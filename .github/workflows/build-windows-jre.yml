name: Build Windows JRE

# Build the stripped Windows JRE once (jlink + trim), publish to
# https://static.routeconverter.com/build/windows/jre-<version>-x64-stripped.zip
# alongside a .sha256 sidecar.
#
# RouteConverterMacOpenSource and TimeAlbumProMac assemblies consume these
# verify sha256, extract into both bundle dirs, then makensis.
#
# Triggers:
#   workflow_dispatch — manual rebuild
#   push paths — automatic when the jlink recipe changes
#
# Plan: rc-meta docs/00018-release-automation-3.4.md Phase 5.4 prerequisite.

on:
  workflow_dispatch:
    inputs:
      jdk_version:
        description: 'Override Temurin JDK version (blank = read jre.version from route-converter-build/pom.xml)'
        required: false
        default: ''
  push:
    branches: [master]
    paths:
      - 'route-converter-build/pom.xml'
      - 'scripts/jre-modules.txt'
      - '.github/workflows/build-windows-jre.yml'

concurrency:
  group: build-windows-jre
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve JDK version
        id: jdk
        shell: bash
        run: |
          # Manual dispatch input overrides; otherwise read the canonical
          # property from route-converter-build/pom.xml.
          if [[ -n "${{ inputs.jdk_version }}" ]]; then
            ver="${{ inputs.jdk_version }}"
          else
            ver=$(sed -nE 's|.*<jre\.version>([^<]+)</jre\.version>.*|\1|p' \
                  route-converter-build/pom.xml | head -1)
          fi
          [[ -n "$ver" ]] || { echo "::error::failed to resolve JDK version"; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "JDK version: $ver"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.version }}

      - name: Resolve module list
        id: modules
        shell: bash
        run: |
          # single source of truth shared with build-mac-jre.yml and
          # scripts/verify-runtime.sh -- one module per line, '#'/blank ignored
          list=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' scripts/jre-modules.txt | tr -d '[:blank:]' | paste -sd, -)
          [[ -n "$list" ]] || { echo "::error::empty module list from scripts/jre-modules.txt"; exit 1; }
          echo "list=$list" >> "$GITHUB_OUTPUT"
          echo "modules: $list"

      - name: jlink stripped JRE
        shell: cmd
        env:
          VER: ${{ steps.jdk.outputs.version }}
          MODULES: ${{ steps.modules.outputs.list }}
        run: |
          set OUT=jre-%VER%
          if exist %OUT% rmdir /s /q %OUT%
          "%JAVA_HOME%\bin\jlink" ^
            --module-path "%JAVA_HOME%\jmods" ^
            --add-modules %MODULES% ^
            --output %OUT% ^
            --strip-debug --compress 2 --no-header-files --no-man-pages
          if exist %OUT%\legal rmdir /s /q %OUT%\legal
          if exist %OUT%\release del /q %OUT%\release
          if exist %OUT%\bin\javaw.exe del /q %OUT%\bin\javaw.exe
          if exist %OUT%\bin\keytool.exe del /q %OUT%\bin\keytool.exe
          if exist %OUT%\bin\kinit.exe del /q %OUT%\bin\kinit.exe
          if exist %OUT%\bin\klist.exe del /q %OUT%\bin\klist.exe
          if exist %OUT%\bin\ktab.exe del /q %OUT%\bin\ktab.exe
          if exist %OUT%\bin\client rmdir /s /q %OUT%\bin\client
          if exist %OUT%\lib\client rmdir /s /q %OUT%\lib\client
          if exist %OUT%\lib\server rmdir /s /q %OUT%\lib\server
          if exist %OUT%\conf\security\policy\README.txt del /q %OUT%\conf\security\policy\README.txt

      - name: Show full JRE tree
        shell: bash
        env:
          VER: ${{ steps.jdk.outputs.version }}
        run: |
          find "jre-${VER}" -print
          echo "--- summary ---"
          echo "files: $(find "jre-${VER}" -type f | wc -l)"
          echo "dirs:  $(find "jre-${VER}" -type d | wc -l)"
          echo "bytes: $(du -sb "jre-${VER}" | awk '{print $1}')"

      - name: Zip + sha256
        id: pack
        shell: bash
        env:
          VER: ${{ steps.jdk.outputs.version }}
        run: |
          base="jre-${VER}-x64-stripped"
          (cd "jre-${VER}" && 7z a -tzip -mx=9 "../${base}.zip" . >/dev/null)
          sha256sum "${base}.zip" | awk -v f="${base}.zip" '{print $1"  "f}' > "${base}.zip.sha256"
          ls -la "${base}.zip" "${base}.zip.sha256"
          cat "${base}.zip.sha256"
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: stripped-jre
          path: |
            ${{ steps.pack.outputs.base }}.zip
            ${{ steps.pack.outputs.base }}.zip.sha256
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: stripped-jre
          path: artefacts/
      - name: Inspect artefacts
        run: ls -la artefacts/
      - name: Configure SSH
        env:
          DEPLOY_KEY:  ${{ secrets.RC_RELEASE_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Rsync to static.routeconverter.com/build/windows/
        env:
          DEPLOY_HOST: ${{ secrets.RC_RELEASE_DEPLOY_HOST }}
        run: |
          rsync -av --omit-dir-times --no-perms \
            artefacts/ \
            "rc-release-deploy@${DEPLOY_HOST}:/var/www/routeconverter.com/static/build/windows/"
