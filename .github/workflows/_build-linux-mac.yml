name: _build-linux-mac

# Reusable workflow: builds RouteConverter + TimeAlbumPro OpenSource
# artefacts on ubuntu-latest, stages them, uploads as a workflow artefact.
#
# Called by:
#   - prerelease.yml (artefact-name: prerelease-linux-mac)
#   - release.yml    (artefact-name: release-linux-mac)
#
# See rc-meta/specs/00018-release-automation-3.4.md Phase 5.2.

on:
  workflow_call:
    inputs:
      artefact-name:
        description: 'Name for the uploaded workflow artefact'
        required: true
        type: string
      retention-days:
        description: 'Retention in days for the workflow artefact'
        required: false
        type: number
        default: 7
      sign:
        description: 'Submit standalone jars to SignPath for jar-signing'
        required: false
        type: boolean
        default: false
      signing-policy-slug:
        description: 'SignPath signing policy (test-signing | release-signing)'
        required: false
        type: string
        default: test-signing
    secrets:
      SIGNPATH_API_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '17'
      - uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Resolve JRE version
        id: jre
        run: |
          ver=$(sed -nE 's|.*<jre\.version>([^<]+)</jre\.version>.*|\1|p' \
                pom.xml | head -1)
          [[ -n "$ver" ]] || { echo "::error::failed to resolve jre.version"; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "JRE version: $ver"
      - name: Fetch hosted Mac JREs (x64 + aarch64)
        env:
          VER: ${{ steps.jre.outputs.version }}
        run: |
          set -euo pipefail
          base_url=https://static.routeconverter.com/build/mac
          # --retry-all-errors so a mid-transfer "connection reset by peer"
          # (curl exit 35) is retried, not just connection-refused errors.
          curl_opts=(-fsSL --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 30)
          for arch in x64 aarch64; do
            zip="jre-${VER}-${arch}-stripped.zip"
            curl "${curl_opts[@]}" -o "$zip"        "${base_url}/${zip}"
            curl "${curl_opts[@]}" -o "${zip}.sha256" "${base_url}/${zip}.sha256"
            sha256sum -c "${zip}.sha256"
            for mod in RouteConverterMac TimeAlbumProMac; do
              mkdir -p "${mod}/target/Runtime-${arch}"
              unzip -q "$zip" -d "${mod}/target/Runtime-${arch}"
            done
            rm -f "$zip" "${zip}.sha256"
          done
      - name: Build
        # github.run_number is the CALLER workflow's run number — same
        # value the inline jobs used before Phase 5.2.
        # No `clean` — runner is ephemeral; `clean` would also wipe the
        # Runtime-<arch> dirs unpacked from the hosted Mac JREs above.
        run: ./mvnw --batch-mode -Prouteconverter -Dmaven.build.number=${{ github.run_number }} package
      - name: Verify runtime on stripped JRE (class-load gate)
        # Reproduces the minimized-JRE condition from scripts/jre-modules.txt and
        # fails the build on a ClassNotFoundException/NoClassDefFoundError that a
        # full-JDK unit test never sees (e.g. httpclient5 5.6 needing jdk.net,
        # 2026-06). The Linux fat jar carries the same dependency set as the Mac
        # and Windows bundles, so this one cheap ubuntu run gates all three.
        run: |
          scripts/verify-runtime.sh \
            RouteConverterLinux/target/RouteConverterLinux.jar \
            RouteConverterCmdLine/target/RouteConverterCmdLine.jar
      - name: Stage artefacts
        run: |
          mkdir -p artefacts
          cp RouteConverterLinux/target/RouteConverterLinux.* artefacts/
          cp RouteConverterMac/target/RouteConverterMac-x64-app.zip artefacts/
          cp RouteConverterMac/target/RouteConverterMac-aarch64-app.zip artefacts/
          cp RouteConverterCmdLine/target/RouteConverterCmdLine.* artefacts/
          cp TimeAlbumProLinux/target/TimeAlbumProLinux.* artefacts/
          cp TimeAlbumProMac/target/TimeAlbumProMac-x64-app.zip artefacts/
          cp TimeAlbumProMac/target/TimeAlbumProMac-aarch64-app.zip artefacts/
      - name: Collect jars for signing
        if: ${{ inputs.sign }}
        run: |
          mkdir -p to-sign
          cp RouteConverterLinux/target/RouteConverterLinux.jar     to-sign/
          cp RouteConverterCmdLine/target/RouteConverterCmdLine.jar to-sign/
          cp TimeAlbumProLinux/target/TimeAlbumProLinux.jar         to-sign/

      - name: Upload unsigned jars (SignPath input)
        if: ${{ inputs.sign }}
        id: unsigned
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-jars-${{ inputs.artefact-name }}
          path: to-sign/
          retention-days: ${{ inputs.retention-days }}

      - name: Submit signing request to SignPath
        if: ${{ inputs.sign }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: RouteConverter
          signing-policy-slug: ${{ inputs.signing-policy-slug }}
          artifact-configuration-slug: jars
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-jars

      - name: Overlay signed jars into artefacts/
        if: ${{ inputs.sign }}
        run: |
          cp signed-jars/RouteConverterLinux.jar     artefacts/
          cp signed-jars/RouteConverterCmdLine.jar   artefacts/
          cp signed-jars/TimeAlbumProLinux.jar       artefacts/

      - name: Verify jar signatures
        if: ${{ inputs.sign }}
        run: |
          fail=0
          for j in RouteConverterLinux.jar RouteConverterCmdLine.jar TimeAlbumProLinux.jar; do
            if jarsigner -verify "artefacts/$j" | grep -q '^jar verified\.'; then
              echo "OK  $j signed"
            else
              echo "::error::$j is NOT signed — check the SignPath 'jars' artifact config includes it"
              fail=1
            fi
          done
          [[ $fail -eq 0 ]]

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artefact-name }}
          path: artefacts/
          retention-days: ${{ inputs.retention-days }}
